<div class="chat-window" #chatWindow (scroll)="onScroll()">
  @if (messages().length === 0) {
    <app-welcome-screen (promptSelected)="promptSelected.emit($event)" />
  } @else {
    <div class="chat-window__list">
      @for (message of messages(); track message.id) {
        <app-message-bubble [message]="message" />
      }
      <div #scrollAnchor class="chat-window__anchor"></div>
    </div>

    @if (showScrollToBottom()) {
      <button
        class="chat-window__scroll-to-bottom"
        type="button"
        aria-label="Scroll to last message"
        (click)="scrollToBottom()"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    }
  }
</div>
