<header class="vitals">
  <div class="vitals__identity">
    <div class="vitals__mark">
      <span class="vitals__mark-pulse" [class.vitals__mark-pulse--live]="connected()"></span>
      <span class="vitals__mark-glyph">M</span>
    </div>
    <div class="vitals__title-block">
      <h1 class="vitals__title">MedAI</h1>
      <p class="vitals__session">{{ sessionTitle() }}</p>
    </div>
  </div>

  <div class="vitals__trace" [class.vitals__trace--active]="active()" aria-hidden="true">
    <svg viewBox="0 0 320 48" preserveAspectRatio="none">
      <path
        class="vitals__trace-line"
        [attr.d]="connected() ? svgPath() : flatPath()"
        fill="none"
      />
    </svg>
  </div>

  <div class="vitals__status" [class.vitals__status--down]="!connected()">
    <span class="vitals__status-dot"></span>
    <span class="vitals__status-text">{{ connected() ? 'Agent online' : 'Reconnecting…' }}</span>
  </div>
</header>
